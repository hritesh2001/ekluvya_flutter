name: ekluvya_app
description: "Ekluvya — production-ready Flutter application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  image_picker: ^1.0.7
  google_sign_in: ^6.2.1
  shared_preferences: ^2.2.2

  # State management
  provider: ^6.1.2

  # Offline / connectivity detection
  connectivity_plus: ^6.0.3

  # Cached network images with placeholder and error support
  cached_network_image: ^3.3.1

  # SVG rendering (video.svg and other vector assets)
  flutter_svg: ^2.0.10

  # Open banner URLs in the device browser
  url_launcher: ^6.3.0

  # OTT video player — HLS, adaptive bitrate, caching, resume, speed control
  better_player_enhanced: ^1.0.2

  # Keep screen awake during video playback
  wakelock_plus: ^1.2.8

  # Google Fonts — Poppins (no bundled files needed)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/


flutter_icons:
  android: true
  ios: false
  adaptive_icon_background: "#ffffff"
  image_path: "assets/icons/app-logo.png"
