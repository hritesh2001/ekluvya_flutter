name: ekluvya_app
description: "Ekluvya — production-ready Flutter application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  image_picker: ^1.0.7
  google_sign_in: ^6.2.1
  shared_preferences: ^2.2.2

  # State management
  provider: ^6.1.2

  # Offline / connectivity detection
  connectivity_plus: ^6.0.3

  # Cached network images with placeholder and error support
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/logo.png

flutter_icons:
  android: true
  ios: false
  adaptive_icon_background: "#ffffff"
  image_path: "assets/icons/app-logo.png"
